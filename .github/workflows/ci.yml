name: CI

on:
  push:
    branches: [ main, feature/* ]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    env:
      # Force UTF-8 encoding on Windows for proper Unicode handling
      PYTHONIOENCODING: utf-8

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies (locked)
      run: uv sync --frozen --all-extras

    - name: Run pre-commit hooks (format/lint/static checks)
      run: uv run pre-commit run --all-files

    - name: Run type checking
      run: uv run mypy src/tripwire

    - name: Run tests with coverage
      run: uv run pytest --cov=tripwire --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
      uses: codecov/codecov-action@v5
      with:
        files: ./coverage.xml
        flags: unittests
        name: tripwire-coverage
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

  cli-validation:
    name: CLI Validation Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies (locked)
      run: uv sync --frozen --all-extras

    - name: Run CLI validation test suite
      run: uv run pytest tests/test_cli_validation.py -v --tb=short

    - name: Display test summary
      if: always()
      run: uv run pytest tests/test_cli_validation.py --collect-only -q

  security:
    name: Security Scan (pre-commit)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies (locked)
      run: uv sync --frozen --all-extras

    - name: Run Bandit via pre-commit
      run: uv run pre-commit run bandit --all-files || true

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [test, cli-validation, security]
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6

    - name: Build package (sdist + wheel)
      run: uv build

    - name: Check package metadata
      run: uvx twine check dist/*

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Download build artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install built package
      run: |
        python -m pip install --upgrade pip
        pip install dist/*.whl

    - name: Validate CLI using script
      run: |
        chmod +x .github/scripts/validate_cli.sh
        ./.github/scripts/validate_cli.sh

    - name: Test basic functionality
      run: |
        mkdir test_project
        cd test_project

        tripwire init --project-type web

        cat > test_app.py << 'EOF'
        from tripwire import env

        API_KEY = env.require('API_KEY', description='Test API key')
        DEBUG = env.optional('DEBUG', default=False, type=bool)
        PORT = env.optional('PORT', default=8000, type=int)
        EOF

        export API_KEY=test-key-12345
        export DEBUG=true
        export PORT=3000

        python test_app.py

        tripwire generate --force
        tripwire validate
        tripwire check

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies (locked)
      run: uv sync --frozen --all-extras

    - name: Run performance tests
      run: uv run python benchmarks/performance.py

  docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"

    - name: Install dependencies (locked)
      run: uv sync --frozen --all-extras

    - name: Generate documentation
      run: |
        uv run tripwire docs --format markdown > docs/generated.md
        uv run tripwire docs --format html > docs/generated.html
        uv run tripwire docs --format json > docs/generated.json

    - name: Upload documentation
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/generated.*
