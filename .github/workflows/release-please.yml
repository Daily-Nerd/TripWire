on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 9 * * 1'  # weekly Monday 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write

name: release-please

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # release-please creates the release PR and tags/GitHub release on merge.
  # Publishing is handled by .github/workflows/release.yml on the resulting v* tag.
